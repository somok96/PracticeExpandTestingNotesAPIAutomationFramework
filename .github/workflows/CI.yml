# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Note Management API Automation 

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "30 03 * * *"
    - cron: "30 12 * * *"
  
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        options: [qa,uat,dev]
        default: qa
        required: true

      suiteXmlFile:
        description: "Suite File"
        type: choice
        options: [testng_Suite.xml,testng_Regression.xml]
        default: testng_Regression.xml
        required: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Default values for Execution
      id: default
      run: |
        echo "suiteXmlFile=${{ github.event.inputs.suiteXmlFile || 'testng_Regression.xml'}}" >> $GITHUB_OUTPUT 
        echo "env=${{ github.event.inputs.env || 'qa' }}" >> $GITHUB_OUTPUT

    - name: Execute The Test Automation Framework
      run: mvn clean test -DsuiteXmlFile="${{ steps.default.outputs.suiteXmlFile }}" -Denv="${{ steps.default.outputs.env }}"





      
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
